- Downloads:
    - qBittorrent:
        href: "http://{{HOMEPAGE_VAR_LAN_IP}}:8081"
        description: Torrent client through Gluetun
        icon: qbittorrent
        server: local-docker
        container: qbittorrent
        widget:
          type: qbittorrent
          url: http://gluetun:8080
          username: "{{HOMEPAGE_VAR_QBIT_USER}}"
          password: "{{HOMEPAGE_VAR_QBIT_PASS}}"
    - Gluetun:
        href: "http://{{HOMEPAGE_VAR_LAN_IP}}:8081"
        description: VPN gateway for qBittorrent
        icon: gluetun
        server: local-docker
        container: gluetun

- Monitoring:
