---
- Media:
    - Jellyfin:
        href: "http://{{HOMEPAGE_VAR_LAN_IP}}:8096"
        description: Movies and TV playback
        icon: jellyfin
        server: local-docker
        container: jellyfin
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          enableBlocks: true
          enableNowPlaying: true
    - Jellyseerr:
        href: "http://{{HOMEPAGE_VAR_LAN_IP}}:5055"
        description: Request movies and shows
        icon: jellyseerr
        server: local-docker
        container: jellyseerr

- Automation:
