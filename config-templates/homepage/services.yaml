        href: "http://{{HOMEPAGE_VAR_LAN_IP}}:8989"
        description: TV automation
        icon: sonarr
        server: local-docker
        container: sonarr
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
    - Radarr:
